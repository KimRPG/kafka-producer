name: deploy to kafka broker

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout release
        uses: actions/checkout@v4

      - name: archive to tar.gz
        run: tar cvfz ./kafka-producer.tar.gz *

      - name: AWS configure credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: upload to S3
        run: |
          aws s3 cp ./kafka-producer.tar.gz s3://datalake-actions-deploy-rpg-822417885161-ap-northeast-2-an/kafka-producer/kafka-producer.tar.gz

      - name: deploy with AWS codeDeploy
        run: |
          aws deploy create-deployment \
            --application-name datalake-deploy \
            --deployment-group-name kafka-deploy \
            --s3-location bucket=datalake-actions-deploy-rpg-822417885161-ap-northeast-2-an,bundleType=tgz,key=kafka-producer/kafka-producer.tar.gz \
            --region ap-northeast-2